name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dist directory
        run: mkdir -p dist

      - name: Generate Snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: heimaolala
          outputs: |
            dist/snake.svg?color_snake=E8783B&color_dots=#ABAAA8
            dist/snake-dark.svg?palette=github-dark&color_snake=E8783B&color_dots=#ABAAA8

      - name: Fetch Streak Stats
        run: |
          curl --retry 3 --retry-delay 10 -s -o dist/streak.svg "https://streak-stats.demolab.com/?user=heimaolala&background=FEFAF6&stroke=ABAAA8&ring=E8783B&fire=E8783B&currStreakNum=333333&sideNums=333333&currStreakLabel=333333&sideLabels=333333&dates=ABAAA8"

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
